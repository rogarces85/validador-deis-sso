version: "2"
type: frontend
tech_stack:
  - typescript
  - react
  - vite
  - tailwindcss
  - sheetjs
routes:
  - path: /
    file: App.tsx
    auth_required: false
    description: Main Validador REM app page
features:
  - name: Upload Excel File for Validation
    description: Users upload a .xlsx or .xlsm REM file to see validation errors.
    files:
      - App.tsx
      - components/FindingsTable.tsx
      - components/RulesSummary.tsx
      - services/ruleEngine.ts
    entry_route: /
    user_interactions:
      - Drag and drop or select an Excel file
      - Wait for processing
      - View rule validation summary cards
      - View details of individual findings
      - Export results to Excel
    api_calls: []
    auth_required: false
known_limitations: []
